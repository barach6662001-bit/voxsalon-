name: voxsalon
region: fra
services:
  - name: web
    github:
      repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
      branch: main
    build_command: pnpm install --frozen-lockfile && pnpm build
    run_command: pnpm start
    source_dir: /
    http_port: 3000
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    envs:
      - key: VAPI_API_KEY
        type: SECRET
      - key: VAPI_WEBHOOK_SECRET
        type: SECRET
      - key: VAPI_ASSISTANT_ID
        type: SECRET
      - key: TELEGRAM_BOT_TOKEN
        type: SECRET
      - key: TELEGRAM_OWNER_CHAT_ID
        type: SECRET
      - key: NODE_ENV
        value: production